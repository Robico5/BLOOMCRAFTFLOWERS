<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flori din Săpun❤️💙</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body{
    font-family: Arial, sans-serif;
    background-color:#faf3e0;
    margin:0;
    padding:0;
    text-align:center;
}

.logo{
    width:350px;
    margin-top:30px;
}

.container{
    width:90%;
    max-width:900px;
    margin:30px auto;
    background:white;
    padding:30px;
    border-radius:12px;
    box-shadow:0 6px 15px rgba(0,0,0,0.1);
}

h1{ color:#8B0000; }

.descriere{
    font-family:'Playfair Display', serif;
    color:#00a8b5;
    font-size:20px;
    line-height:1.8;
}

.contact-text{
    font-family:'Playfair Display', serif;
    font-weight:600;
    color:#008c95;
    font-size:22px;
}

/* GALERIE */
.galerie{
    display:flex;
    justify-content:center;
    gap:20px;
    flex-wrap:wrap;
    margin:40px 0;
}

.galerie img{
    width:260px;
    border-radius:12px;
}

/* BUTON */
button{
    background:white;
    border:2px solid #8B0000;
    color:#8B0000;
    padding:12px 25px;
    font-size:18px;
    font-weight:bold;
    border-radius:6px;
    cursor:pointer;
    margin-top:15px;
}

button:hover{
    background:#8B0000;
    color:white;
}

/* REVIEW CARD DESIGN */
#reviewsContainer{
    max-width:600px;
    margin:30px auto;
}

.review-card{
    background:white;
    padding:15px;
    margin-bottom:15px;
    border-radius:12px;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
    text-align:left;
}

.review-name{
    font-weight:bold;
    color:#d63384;
}

.review-rating{
    margin:5px 0;
}

.review-comment{
    word-break:break-word;
}

/* STELE */
.stars{
    font-size:26px;
    cursor:pointer;
    color:#ccc;
}

.stars span.active{
    color:gold;
}

/* RESPONSIVE */
@media(max-width:600px){
    .logo{ width:250px; }
    .descriere{ font-size:17px; }
}
</style>
</head>

<body>

<img src="poza logo.jpg" alt="Logo" class="logo">

<div class="container">
<h1>🌹 Buchetele din flori de săpun – O simfonie a frumuseții eterne 🌹</h1>

<p class="descriere">
Florile de săpun rămân o mărturie a eleganței care nu se ofilește niciodată.
</p>

<p class="contact-text">
Alege un buchet de săpun pentru a dărui un zâmbet care nu se va șterge niciodată! 💖💐
</p>
</div>

<div class="container">
<h1>Lasă un Review</h1>

<input id="name" placeholder="Nume client">

<div class="stars" id="stars">
<span data-value="1">★</span>
<span data-value="2">★</span>
<span data-value="3">★</span>
<span data-value="4">★</span>
<span data-value="5">★</span>
</div>

<textarea id="comment" placeholder="Comentariu" style="width:100%;padding:10px;margin-top:10px;"></textarea>

<button onclick="addReview()">Trimite Review</button>

<div id="reviewsContainer"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "review-florarie.firebaseapp.com",
  projectId: "review-florarie",
  storageBucket: "review-florarie.firebasestorage.app",
  messagingSenderId: "427118254866",
  appId: "1:427118254866:web:af8f013dd7367e1dc6b1cb"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let rating = 0;
const stars = document.querySelectorAll("#stars span");

stars.forEach(star=>{
    star.onclick=()=>{
        rating = star.dataset.value;
        updateStars();
    }
});

function updateStars(){
    stars.forEach(star=>{
        star.classList.remove("active");
        if(star.dataset.value <= rating)
            star.classList.add("active");
    });
}

window.addReview = async function(){

let name = document.getElementById("name").value.trim();
let comment = document.getElementById("comment").value.trim();

if(name=="" || comment=="" || rating==0){
    alert("Completează toate câmpurile!");
    return;
}

await addDoc(collection(db, "reviews"), {
    name: name,
    rating: Number(rating),
    comment: comment
});

document.getElementById("name").value="";
document.getElementById("comment").value="";
rating=0;
updateStars();

showReviews();
}

async function showReviews(){
const querySnapshot = await getDocs(collection(db, "reviews"));
const container = document.getElementById("reviewsContainer");
container.innerHTML="";

querySnapshot.forEach((doc)=>{
    const r = doc.data();
    container.innerHTML+=`
        <div class="review-card">
            <div class="review-name">${r.name}</div>
            <div class="review-rating">${"⭐".repeat(r.rating)}</div>
            <div class="review-comment">${r.comment}</div>
        </div>
    `;
});
}

showReviews();
</script>

</body>
</html>
