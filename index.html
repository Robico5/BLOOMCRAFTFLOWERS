<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flori din Săpun</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body {
    font-family: Arial, sans-serif;
    background-color: #faf3e0;
    margin: 0;
    padding: 0;
    text-align: center;
}

.container {
    width: 85%;
    max-width: 1000px;
    margin: 20px auto;
    background: white;
    padding: 25px;
    border-radius: 10px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

.logo {
    width: 300px;
    margin-top: 20px;
}

.galerie {
    display: flex;
    justify-content: center;
    gap: 20px;
    flex-wrap: wrap;
    margin: 40px 0;
}

.galerie img {
    width: 250px;
    border-radius: 10px;
    transition: 0.3s;
}

.galerie img:hover {
    transform: scale(1.05);
}

button {
    background: white;
    border: 2px solid #8B0000;
    color: #8B0000;
    padding: 10px 20px;
    font-weight: bold;
    border-radius: 5px;
    cursor: pointer;
}

button:hover {
    background: #8B0000;
    color: white;
}
</style>
</head>

<body>

<!-- LOGO -->
<img src="buchet11.jpg" class="logo" alt="Logo">

<div class="container">
<h1>Buchete din flori de săpun</h1>
<p>Frumusețe care nu se ofilește niciodată 💖</p>
</div>

<h1>Galerie</h1>

<div class="galerie">
<img src="poza1.jpg" alt="Poza 1">
<img src="poza4.jpg" alt="Poza 4">
<img src="floare1.jpg" alt="Floare 1">
</div>

<button>Comandă pe WhatsApp</button>
</a>

</body>
</html>
